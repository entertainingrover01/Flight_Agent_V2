<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightClaim AI — EU261 Compensation Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="chat-wrapper w-full max-w-2xl bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200">

        <!-- Header -->
        <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-100 bg-white flex-shrink-0">
            <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="font-semibold text-slate-900 text-sm leading-tight">FlightClaim AI</h1>
                <p class="text-xs text-slate-500 leading-tight">EU261 Compensation Assistant</p>
            </div>
            <div class="flex items-center gap-1.5 flex-shrink-0">
                <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
                <span class="text-xs text-slate-500">Online</span>
            </div>
        </div>

        <!-- Messages area -->
        <div id="messagesArea" class="flex-1 overflow-y-auto px-4 py-5 space-y-4 messages-area">
        </div>

        <!-- Typing indicator -->
        <div id="typingIndicator" class="hidden px-4 pb-3 flex-shrink-0">
            <div class="flex items-end gap-2.5">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="bg-slate-100 rounded-2xl rounded-bl-sm px-4 py-3">
                    <div class="flex gap-1">
                        <span class="typing-dot"></span>
                        <span class="typing-dot" style="animation-delay: 160ms"></span>
                        <span class="typing-dot" style="animation-delay: 320ms"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="px-4 pb-4 pt-3 border-t border-slate-100 bg-white flex-shrink-0">
            <div class="flex items-end gap-2.5">
                <textarea
                    id="chatInput"
                    placeholder="Describe your flight issue or ask a question..."
                    class="chat-input flex-1 resize-none rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all leading-relaxed"
                    rows="1"
                ></textarea>
                <button
                    id="sendBtn"
                    class="flex-shrink-0 w-11 h-11 bg-blue-600 rounded-xl flex items-center justify-center hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                >
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                    </svg>
                </button>
            </div>
            <p class="text-xs text-slate-400 mt-2 text-center">Covers EU261 regulations &middot; Flights to/from EU airports</p>
        </div>

    </div>

    <script src="scripts.js"></script>
</body>
</html>
